name: repack-llvm-manual

on:
  workflow_dispatch:
    inputs:
      version:
        description: "LLVM version (example: 21.1.8)"
        required: true
        default: 21.1.8
        type: string
      publish:
        description: "Publish GitHub release"
        required: true
        default: false
        type: boolean

jobs:
  repack:
    uses: ./.github/workflows/reusable-repack.yml
    with:
      version: ${{ inputs.version }}

  publish-release:
    if: ${{ inputs.publish }}
    needs: repack
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download workflow artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: llvm-project-${{ inputs.version }}.src.tar.zst
          path: out

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tools/create-release.sh \
            "${{ inputs.version }}" \
            "out/llvm-project-${{ inputs.version }}.src.tar.zst" \
            "out/llvm-project-${{ inputs.version }}.src.tar.zst.sha256"
