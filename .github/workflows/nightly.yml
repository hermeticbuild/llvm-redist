name: repack-llvm-nightly

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  detect-and-repack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: bazelbuild/setup-bazelisk@6ecf4fd8b7d1f9721785f1dd656a689acf9add47

      - name: Resolve latest upstream release
        id: latest
        run: |
          version="$(tools/latest-llvm-version.sh)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check if already published in this repo
        id: exists
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="llvmorg-${{ steps.latest.outputs.version }}-r1"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Repack latest
        if: ${{ steps.exists.outputs.exists == 'false' }}
        run: tools/repack-llvm.sh "${{ steps.latest.outputs.version }}"

      - name: Upload workflow artifact
        if: ${{ steps.exists.outputs.exists == 'false' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: llvm-project-${{ steps.latest.outputs.version }}.src.tar.zst
          path: |
            out/llvm-project-${{ steps.latest.outputs.version }}.src.tar.zst
            out/llvm-project-${{ steps.latest.outputs.version }}.src.tar.zst.sha256
          if-no-files-found: error

      - name: Attest release artifacts
        if: ${{ steps.exists.outputs.exists == 'false' }}
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: |
            out/llvm-project-${{ steps.latest.outputs.version }}.src.tar.zst
            out/llvm-project-${{ steps.latest.outputs.version }}.src.tar.zst.sha256

      - name: Publish release
        if: ${{ steps.exists.outputs.exists == 'false' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tools/create-release.sh \
            "${{ steps.latest.outputs.version }}" \
            "out/llvm-project-${{ steps.latest.outputs.version }}.src.tar.zst" \
            "out/llvm-project-${{ steps.latest.outputs.version }}.src.tar.zst.sha256"
