name: repack-llvm-nightly

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.latest.outputs.version }}
      exists: ${{ steps.exists.outputs.exists }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Resolve latest upstream release
        id: latest
        run: |
          version="$(tools/latest-llvm-version.sh)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check if already published in this repo
        id: exists
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="llvmorg-${{ steps.latest.outputs.version }}-r1"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

  repack:
    needs: detect
    if: ${{ needs.detect.outputs.exists == 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: bazelbuild/setup-bazelisk@6ecf4fd8b7d1f9721785f1dd656a689acf9add47

      - name: Repack latest
        run: tools/repack-llvm.sh "${{ needs.detect.outputs.version }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst
          path: |
            out/llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst
            out/llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst.sha256
          if-no-files-found: error

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: |
            out/llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst
            out/llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst.sha256

  publish-release:
    needs:
      - detect
      - repack
    if: ${{ needs.detect.outputs.exists == 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download workflow artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst
          path: out

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tools/create-release.sh \
            "${{ needs.detect.outputs.version }}" \
            "out/llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst" \
            "out/llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst.sha256"
