name: repack-llvm-nightly

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.latest.outputs.version }}
      exists: ${{ steps.exists.outputs.exists }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve latest upstream release
        id: latest
        run: |
          version="$(tools/latest-llvm-version.sh)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check if already published in this repo
        id: exists
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="llvmorg-${{ steps.latest.outputs.version }}-r1"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

  repack:
    needs: detect
    if: ${{ needs.detect.outputs.exists == 'false' }}
    uses: ./.github/workflows/reusable-repack.yml
    permissions:
      contents: read
      attestations: write
      artifact-metadata: write
      id-token: write
    with:
      version: ${{ needs.detect.outputs.version }}

  publish-release:
    needs:
      - detect
      - repack
    if: ${{ needs.detect.outputs.exists == 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download workflow artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst
          path: out

      - name: Download attestation bundle artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst.attestation
          path: out

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tools/create-release.sh \
            "${{ needs.detect.outputs.version }}" \
            "out/llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst" \
            "out/llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst.sha256" \
            "llvmorg-${{ needs.detect.outputs.version }}-r1" \
            "out/llvm-project-${{ needs.detect.outputs.version }}.src.tar.zst.attestation.jsonl"
